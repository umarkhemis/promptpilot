
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Promptify</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 300px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #080810;
      color: #e2e8f0;
      font-size: 13px;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 16px;
      border-bottom: 1px solid rgba(255,255,255,0.07);
    }

    .header img {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      object-fit: cover;
    }

    .header span {
      font-size: 15px;
      font-weight: 700;
      color: #fff;
      letter-spacing: -0.02em;
    }

    .section { padding: 16px; }

    /* ── Logged out ── */
    #view-loggedout p {
      color: #64748b;
      margin-bottom: 14px;
      line-height: 1.5;
    }

    .field { margin-bottom: 12px; }

    .field label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: #475569;
      margin-bottom: 5px;
    }

    .field input {
      width: 100%;
      padding: 9px 12px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.09);
      border-radius: 8px;
      color: #e2e8f0;
      font-size: 13px;
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
    }

    .field input:focus {
      border-color: rgba(108,58,255,0.5);
      box-shadow: 0 0 0 3px rgba(108,58,255,0.1);
    }

    .btn-primary {
      width: 100%;
      padding: 10px;
      background: linear-gradient(135deg, #6C3AFF, #8B5CF6);
      border: none;
      border-radius: 8px;
      color: #fff;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s;
      margin-top: 4px;
    }

    .btn-primary:hover { opacity: 0.9; }
    .btn-primary:disabled { opacity: 0.5; cursor: default; }

    .error-msg {
      margin-top: 10px;
      padding: 8px 12px;
      background: rgba(239,68,68,0.1);
      border: 1px solid rgba(239,68,68,0.25);
      border-radius: 6px;
      color: #f87171;
      font-size: 12px;
      display: none;
    }

    /* ── Logged in ── */
    #view-loggedin { display: none; }

    .user-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }

    .user-email {
      font-size: 12px;
      color: #64748b;
      max-width: 180px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .btn-signout {
      background: none;
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 6px;
      color: #475569;
      font-size: 11px;
      padding: 4px 8px;
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s;
    }

    .btn-signout:hover { border-color: rgba(255,255,255,0.2); color: #94a3b8; }

    .mode-label {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: #475569;
      margin-bottom: 8px;
    }

    .mode-toggle {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
    }

    .mode-btn {
      flex: 1;
      padding: 8px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.09);
      border-radius: 8px;
      color: #64748b;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      text-align: center;
      transition: all 0.15s;
    }

    .mode-btn.active {
      background: rgba(108,58,255,0.15);
      border-color: rgba(108,58,255,0.4);
      color: #a78bfa;
    }

    .status-row {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 10px 12px;
      background: rgba(29,158,117,0.1);
      border: 1px solid rgba(29,158,117,0.25);
      border-radius: 8px;
      color: #4ade80;
      font-size: 12px;
      font-weight: 500;
    }

    .status-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #4ade80;
      flex-shrink: 0;
    }

    .open-app-link {
      display: block;
      text-align: center;
      margin-top: 12px;
      color: #6C3AFF;
      font-size: 12px;
      text-decoration: none;
      transition: color 0.15s;
    }

    .open-app-link:hover { color: #a78bfa; }
  </style>
</head>
<body>

  <div class="header">
    <img src="icons/icon48.png" alt="Promptify" />
    <span>Promptify</span>
  </div>

  <!-- Logged out view -->
  <div class="section" id="view-loggedout">
    <p>Sign in to improve prompts on ChatGPT, Claude, Gemini and more.</p>
    <div class="field">
      <label>Email</label>
      <input type="email" id="input-email" placeholder="you@example.com" autocomplete="email" />
    </div>
    <div class="field">
      <label>Password</label>
      <input type="password" id="input-password" placeholder="••••••••" autocomplete="current-password" />
    </div>
    <button class="btn-primary" id="btn-login">Sign in</button>
    <div class="error-msg" id="login-error"></div>
  </div>

  <!-- Logged in view -->
  <div class="section" id="view-loggedin">
    <div class="user-row">
      <span class="user-email" id="user-email-display"></span>
      <button class="btn-signout" id="btn-signout">Sign out</button>
    </div>

    <div class="mode-label">Improve mode</div>
    <div class="mode-toggle">
      <div class="mode-btn active" data-mode="student" id="mode-student">Student</div>
      <div class="mode-btn" data-mode="marketing" id="mode-marketing">Marketing</div>
    </div>

    <div class="status-row">
      <div class="status-dot"></div>
      Active on this page — click <strong style="margin: 0 3px;">Improve</strong> to enhance your prompt
    </div>

    <a class="open-app-link" href="https://promptpilot-lac.vercel.app/dashboard" target="_blank">
      Open Promptify dashboard →
    </a>
  </div>

  <script src="popup.js"></script>
</body>
</html>
